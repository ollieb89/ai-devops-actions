# AI Debugging Stack
# Problem: AI behavior regressed and you don't know why
# Actions: ai-workflow-evals + llm-cost-tracker + ai-root-cause-hints

name: AI Debugging

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'           # daily regression check

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # 1. Run your eval suite — catch behavioral regressions
      - id: evals
        uses: ollieb89/ai-workflow-evals@v1.0.0
        with:
          eval-suite: ./evals       # path to your eval definitions
          fail-on: none             # let root-cause-hints handle escalation
          post-comment: false

      # 2. Track what this run cost — detect budget anomalies
      - id: costs
        uses: ollieb89/llm-cost-tracker@v1.0.0
        with:
          provider: anthropic       # openai | anthropic | google
          budget-limit: '5.00'
          alert-on-spike: true

      # 3. Correlate signals → explain why it broke
      - uses: ollieb89/ai-root-cause-hints@v1.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          eval-failures: ${{ steps.evals.outputs.failures }}
          eval-suite: './evals'
          cost-spike: ${{ steps.costs.outputs.spike-multiplier }}
          model: ${{ steps.costs.outputs.model }}
          fail-on-findings: false   # set true to block merges on HIGH confidence hints

# ── Expected output ──────────────────────────────────────────────────────────
#
# Job summary shows:
#
# Evals:
#   ✅ 12/12 evals passed — no regressions detected
#   OR
#   ❌ 2/12 evals failed: customer_support_accuracy, refund_flow
#
# Costs:
#   💰 Run cost: $0.42 | Budget: $5.00 | No spike detected
#   OR
#   ⚠️ Cost spike: 3.2x above baseline ($4.10 vs $1.28 average)
#
# Root cause hints (when failures detected):
#   🔴 Eval failure likely caused by knowledge drift
#   Confidence: HIGH
#   Signals: eval_failure + rag_change (18% deletion)
#   → Review deleted documents in /knowledge-base
#   → Re-run evals with previous corpus snapshot
#   → Pin corpus version or add change gate before eval runs
#
# ─────────────────────────────────────────────────────────────────────────────
